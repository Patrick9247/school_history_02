<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 主色调渐变 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <!-- 金色渐变 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24" />
      <stop offset="50%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
    <!-- 外环发光 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 外圆环 -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#goldGrad)" stroke-width="8" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#1a365d" stroke-width="2"/>
  
  <!-- 内圆环 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
  
  <!-- 装饰齿纹 -->
  <g stroke="url(#goldGrad)" stroke-width="3" fill="none">
    <line x1="256" y1="16" x2="256" y2="40"/>
    <line x1="256" y1="472" x2="256" y2="496"/>
    <line x1="16" y1="256" x2="40" y2="256"/>
    <line x1="472" y1="256" x2="496" y2="256"/>
    <line x1="90" y1="90" x2="108" y2="108"/>
    <line x1="404" y1="404" x2="422" y2="422"/>
    <line x1="422" y1="90" x2="404" y2="108"/>
    <line x1="108" y1="404" x2="90" y2="422"/>
  </g>
  
  <!-- 中心背景圆 -->
  <circle cx="256" cy="256" r="170" fill="#0f172a"/>
  <circle cx="256" cy="256" r="165" fill="url(#mainGrad)" opacity="0.3"/>
  
  <!-- 地球图案（简化） -->
  <circle cx="256" cy="240" r="80" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.8"/>
  <ellipse cx="256" cy="240" rx="80" ry="30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="176" y1="240" x2="336" y2="240" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- CDUT 文字 -->
  <text x="256" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#goldGrad)" filter="url(#glow)">CDUT</text>
  
  <!-- 顶部装饰 -->
  <path d="M200 140 Q256 120 312 140" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.7"/>
  
  <!-- 底部弧线装饰 -->
  <path d="M180 420 Q256 440 332 420" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>
</svg>
