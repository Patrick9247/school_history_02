<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 主色调渐变 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <!-- 金色渐变 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d" />
      <stop offset="50%" style="stop-color:#fbbf24" />
      <stop offset="100%" style="stop-color:#f59e0b" />
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 金色发光 -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#fbbf24" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 外圆环 - 金色发光 -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#goldGrad)" stroke-width="10" filter="url(#goldGlow)"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
  
  <!-- 内圆环 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#goldGrad)" stroke-width="5" filter="url(#glow)"/>
  
  <!-- 装饰齿纹 -->
  <g stroke="url(#goldGrad)" stroke-width="4" fill="none" filter="url(#glow)">
    <line x1="256" y1="16" x2="256" y2="50"/>
    <line x1="256" y1="462" x2="256" y2="496"/>
    <line x1="16" y1="256" x2="50" y2="256"/>
    <line x1="462" y1="256" x2="496" y2="256"/>
    <line x1="85" y1="85" x2="112" y2="112"/>
    <line x1="400" y1="400" x2="427" y2="427"/>
    <line x1="427" y1="85" x2="400" y2="112"/>
    <line x1="112" y1="400" x2="85" y2="427"/>
  </g>
  
  <!-- 中心背景圆 -->
  <circle cx="256" cy="256" r="175" fill="#1e3a5f" opacity="0.4"/>
  <circle cx="256" cy="256" r="170" fill="url(#mainGrad)" opacity="0.15"/>
  
  <!-- 地球图案 -->
  <circle cx="256" cy="245" r="85" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.9" filter="url(#glow)"/>
  <ellipse cx="256" cy="245" rx="85" ry="32" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.7"/>
  <ellipse cx="256" cy="245" rx="32" ry="85" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="171" y1="245" x2="341" y2="245" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>
  
  <!-- CDUT 文字 -->
  <text x="256" y="385" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900" fill="url(#goldGrad)" filter="url(#goldGlow)">CDUT</text>
  
  <!-- 顶部装饰弧线 -->
  <path d="M195 145 Q256 125 317 145" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  
  <!-- 底部装饰弧线 -->
  <path d="M175 425 Q256 445 337 425" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>
  
  <!-- 内部装饰圆点 -->
  <circle cx="256" cy="80" r="4" fill="url(#goldGrad)" filter="url(#glow)"/>
  <circle cx="256" cy="432" r="4" fill="url(#goldGrad)" filter="url(#glow)"/>
  <circle cx="80" cy="256" r="4" fill="url(#goldGrad)" filter="url(#glow)"/>
  <circle cx="432" cy="256" r="4" fill="url(#goldGrad)" filter="url(#glow)"/>
</svg>
